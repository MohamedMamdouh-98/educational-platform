<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="../../../assets/img/favicon/favicon.png"
    />
    <!--=============== REMIXICONS ===============-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../../assets/css/modules.css" />
    <!-- Font Awesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <title>Module Details</title>
    <style>
      :root {
        --bg-color: #f4e9d9;
        --card-bg: #fffbf2;
        --accent-brown: #6d4c41;
        --text-color: #4e342e;
        --header-color: #5d2e17;
      }

      .pedagogical-knowledge {
        width: 100%;
        background: #fef6f2;
        border: 2px solid var(--border-color);
        border-radius: 40px;
        border-top: #8d5d36 5px solid;
        /* padding: 30px; */
        margin: 35px 0;
        box-shadow:
          0 10px 20px rgba(0, 0, 0, 0.08),
          0 20px 40px rgba(0, 0, 0, 0.06),
          0 5px 10px rgba(0, 0, 0, 0.05);
        position: relative;
        overflow: hidden;
      }
      .mopile {
        display: none;
      }
      .button-answer {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .math-section__button {
        margin: 2.2rem auto; /* less space */
        margin-top: 0;
        display: inline-block;
        background: #7b3827;
        border: none;
        border-radius: 3rem;
        padding: 0.8rem 2.8rem 0.9rem 2.8rem; /* compact */
        box-shadow:
          0 9px 18px -7px #4a3323,
          0 3px 0 0 #4f3726,
          inset 0 1px 3px #fff3e0;
        font-size: 1.3rem; /* smaller button text */
        font-weight: 570;
        color: #fcf3e9;
        letter-spacing: 0.4px;
        cursor: pointer;
        transition: 0.12s;
        border: 1px solid rgba(255, 235, 210, 0.5);
        transform: translateY(0);
        backdrop-filter: blur(2px);
        line-height: 1.3;
        white-space: nowrap; /* keep "Answer Here" in one line */
      }

      .math-section__button:hover {
        background: #7b3827;
        box-shadow:
          0 12px 22px -8px #523a27,
          0 3px 0 0 #523a27,
          inset 0 1px 5px #fff5e6;
        transform: translateY(-2px);
        color: white;
      }

      .math-section__button:active {
        transform: translateY(3px);
        box-shadow:
          0 5px 12px -6px #4e3724,
          0 1px 0 0 #4e3724;
      }

      @media screen and (max-width: 768px) {
        .mopile {
          display: block;
        }
        .not-mopile {
          display: none;
        }
      }

      @media screen and (max-width: 500px) {
        .math-section__button {
          padding: 0.7rem 2rem 0.8rem 2rem;
          font-size: 1.2rem;
          white-space: normal; /* allow wrap if extremely small */
        }
      }
    </style>
  </head>
  <body>
    <!--=============== HEADER ===============-->
    <header class="header" id="header">
      <div class="header__container">
        <a href="#" class="header__logo"> </a>

        <button class="header__toggle" id="header-toggle">
          <i class="ri-menu-line"></i>
        </button>
      </div>
    </header>

    <!--=============== SIDEBAR ===============-->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar__container">
        <div class="sidebar__user">
          <div class="sidebar__img">
            <img src="../../../assets/img/user.png" alt="image" />
          </div>

          <div class="sidebar__info">
            <h3>user name</h3>
            <span>text123@email.com</span>
          </div>
        </div>

        <div class="sidebar__content">
          <div>
            <!-- <h3 class="sidebar__title">MANAGE</h3> -->

            <div class="sidebar__list">
              <a href="/home/" class="sidebar__link">
                <i class="ri-focus-2-line"></i>
                <span>Objectives</span>
              </a>

              <a href="/pre-assessments/" class="sidebar__link">
                <i class="ri-file-list-3-fill"></i>
                <span>Pre-Assessments</span>
              </a>

              <a href="/modules/" class="sidebar__link active-link">
                <i class="ri-book-open-fill"></i>
                <span>Modules</span>
              </a>

              <a href="#" class="sidebar__link">
                <i class="ri-file-list-3-fill"></i>
                <span>Post Assessment</span>
              </a>
            </div>
          </div>
        </div>

        <div class="sidebar__actions">
          <button>
            <i
              class="ri-moon-clear-fill sidebar__link sidebar__theme"
              id="theme-button"
            >
              <span>Theme</span>
            </i>
          </button>

          <button class="sidebar__link" id="btn-log-out">
            <i class="ri-logout-box-r-fill"></i>
            <span>Log Out</span>
          </button>
        </div>
      </div>
    </nav>

    <!--=============== MAIN ===============-->
    <main class="main" id="main">
      <div class="container">
        <div class="pedagogical-knowledge">
          <img
            class="not-mopile"
            width="100%"
            height="auto"
            src="../../../assets/img/module-4/deduce-the-general-formula-lg.png"
            alt="Pedagogical Content Knowledge"
          />
          <img
            class="mopile"
            src="../../../assets/img/module-4/deduce-the-general-formula-sm.png"
            alt="Pedagogical Content Knowledge"
          />
        </div>
        <div class="button-answer">
          <a
            href="https://padlet.com/saraelsayed96/my-epic-sandbox-zfl8g8hguhkj4szw"
            target="_blank"
            class="math-section__button"
            >Answer Here</a
          >
        </div>

        <div class="buttons-actions">
          <a
            href="/modules/digital-configuration/knowledge-content-digital/"
            class="guide-button previous-page"
          >
            <i class="fas fa-arrow-left"></i>
            Previous Page
          </a>
          <a
            href="/modules/digital-configuration/importance-of-identifying/"
            class="guide-button next-page"
          >
            Next Page
            <i class="fas fa-arrow-right"></i>
          </a>
        </div>
      </div>
    </main>

    <button id="scrollTopBtn" aria-label="Scroll to top">
      <i class="fas fa-arrow-up"></i>
    </button>
    <!-- small note: the page uses only english, as required -->
    <script src="../../../assets/js/quiz-section.js"></script>
    <script src="../../../assets/js/main.js"></script>
  </body>
</html>
